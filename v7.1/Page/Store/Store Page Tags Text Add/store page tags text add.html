  <style>
  
    .twc-sptta {

      display : flex;
      flex-wrap : wrap;
      column-gap : 2em;
      list-style-position : inside;
      padding : 0;
      row-gap : 0;      
      white-space : nowrap;
      
      }
      
    .product-list .product-list-item .product-list-item-link .product-list-item-meta .twc-sptta {

      flex-direction : column;
      
      }
      
    </style>
    
  <script>
  
    ( ( ) => {
    
      const
      
        version = '0.3.0',
        
        s = `
        
          Store Page Tags Text Add v${ version }
          
          License < https://tinyurl.com/s872fb68 >
          
          © 2023-2026 Thomas Creedon
          
          Tom's Web Consulting < http://www.tomsWeb.consulting >
          
          `
          
          .replace ( /^\s+/gm, '' );
          
      console.log ( s );
      
      // initialize twc module
      
      window.twc =
      
        ( ( self ) => self )
        
        ( window.twc || { } );
        
      // initialize twc ptc sub-module
      
      twc.ptc =
      
        ( ( self ) => self )
        
        ( twc.ptc || { } );
        
      // initialize twc ptc callbacks sub-module
      
      twc.ptc.callbacks = ( ( self ) => {
      
        const callback = ( tags ) => {
        
          const isStorePage = Static
          
            .SQUARESPACE_CONTEXT
            
            .collection
            
            ?.type
            
            ===
            
            13;
            
          // bail if not store page
          
          if ( ! isStorePage ) return;
          
          const
          
            codeKey = 'twc-sptta',
            
            fullUrl = Static
            
              .SQUARESPACE_CONTEXT
              
              .collection
              
              .fullUrl,
              
            isDetail
            
              =
              
              !!
              
              Static
              
                .SQUARESPACE_CONTEXT
                
                .item,
                
            isList
            
              =
              
              !
              
              Static
              
                .SQUARESPACE_CONTEXT
                
                .item
                
                ?.id,
                
            elementCallback =
            
              ( element, tag, text ) => {
              
                let
                
                  selector,
                  
                  url = new URLSearchParams (
                  
                    new URL (
                    
                      `http://twc.sptta${
                      
                        fullUrl
                        
                        }`
                        
                      )
                      
                      .search
                      
                    );
                    
                switch ( true ) {
                
                  case isDetail :
                  
                    selector
                    
                      =
                      
                      '.product-detail '
                      
                      +
                      
                      '.product-meta';
                      
                    break;
                    
                  case isList :
                  
                    selector
                    
                      =
                      
                      '.product-list '
                      
                      +
                      
                      '.product-list-item '
                      
                      +
                      
                      '.product-list-item-link '
                      
                      +
                      
                      '.product-list-item-meta';
                      
                    break;
                    
                  }
                  
                url.append ( 'tag', tag.name );
                
                url = `${ fullUrl }?${ url }`;
                
                const wrapperElement = element
                
                  .querySelector ( selector );
                  
                let ulElement = wrapperElement
                
                  .querySelector ( `.${ codeKey }` );
                  
                if ( ! ulElement ) {
                
                  ulElement = document
                  
                    .createElement ( 'template' );
                    
                  ulElement
                  
                    .innerHTML
                    
                    =
                    
                    `
                    
                      <ul class="${ codeKey }">
                      
                        </ul>
                        
                      `;
                      
                  ulElement = ulElement
                  
                    .content
                    
                    .firstElementChild;
                    
                  wrapperElement
                  
                    .append ( ulElement );
                    
                  }
                  
                ulElement
                
                  .insertAdjacentHTML (
                  
                    'beforeend',
                    
                    `
                    
                      <li data-tag-text="${ text }">
                      
                        <a href="${ url }">
                        
                          ${ text }
                          
                          </a>
                          
                        </li>
                        
                      `
                      
                    );
                    
                },
                
            tagCallback = ( tag ) => {
            
              const
              
                re = new RegExp (
                
                  `${ codeKey } (.+) (ld|l|d)`
                  
                  ),
                  
                m = tag.name.match ( re );
                
              // continue if tag doesn't match format
              
              if ( ! m ) return;
              
              const
              
                pageShow = m [ 2 ],
                
                isShow
                
                  =
                  
                  isList && pageShow === 'd'
                  
                  ||
                  
                  isDetail && pageShow === 'l';
                  
              // continue
              
              if ( isShow ) return;
              
              const
              
                text = m [ 1 ],
                
                selector = `.${
                
                  tag.className
                  
                  }`;
                  
              document
              
                .body
                
                .querySelectorAll ( selector )
                
                .forEach (
                
                  e => elementCallback (
                  
                    e,
                    
                    tag,
                    
                    text
                    
                    )
                    
                  );
                
              };
              
          tags
          
            .filter (
            
              t => t.name.startsWith (
              
                `${ codeKey } `
                
                )
                
              )
              
            .forEach ( tagCallback );
            
          };
          
        self.push ( callback );
        
        return self;
        
        } ) ( twc.ptc.callbacks || [ ] );
        
      } ) ( );
      
    </script>
  
  <!-- end TWC Store Page Tags Text Add -->
