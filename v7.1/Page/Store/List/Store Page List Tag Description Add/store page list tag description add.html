  <script>
  
    ( ( ) => {
    
      /*
      
        store page list tag description add
        
        License           : < https://tinyurl.com/s872fb68 >
        
        Version           : 0.2.1
        
        SS Version        : 7.1
        
        Products V2
        Compatible        : Yes
        
        Fluid
        Engine
        Compatible        : Not Applicable
        
        Dependencies      : Page Tags Cache < https://tinyurl.com/4frfus4a >
        
        Copyright         : 2023-2026 Thomas Creedon
                            
                            Tom's Web Consulting
                            
                            < http://www.tomsWeb.consulting/ >
        
        no user serviceable parts below
        
        */
        
      const
      
        version = '0.2.1',
        
        s = `Store Page List Tag Description Add v${ version }
        
          License < https://tinyurl.com/s872fb68 >
          
          © 2023-2026 Thomas Creedon
          
          Tom's Web Consulting < http://www.tomsWeb.consulting >`
          
          .replace ( /^\s+/gm, '' );
          
      console.log ( s );
      
      } ) ( );
      
    // initialize twc module
    
    window.twc =
    
      ( ( self ) => self )
      
      ( window.twc || { } );
      
    // initialize twc ptc sub-module
    
    twc.ptc =
    
      ( ( self ) => self )
      
      ( twc.ptc || { } );
      
    // initialize twc ptc callbacks sub-module
    
    twc.ptc.callbacks = ( ( self ) => {
    
      const callback = ( tags ) => {
      
        const isList
        
          =
          
          !
          
          Static
          
            .SQUARESPACE_CONTEXT
            
            .item
            
            ?.id;
            
        // bail if not list
        
        if ( ! isList ) return;
        
        const
        
          searchParams =
          
            new URLSearchParams (
            
              location.search
              
              ),
              
          isTagPage =
          
            searchParams.has ( 'tag' );
            
        // bail if not tag page
        
        if ( ! isTagPage ) return;
        
        // global
        
        {
        
          // initialize twc module
          
          window.twc =
          
            ( ( self ) => self )
            
            ( window.twc || { } );
            
          // initialize twc spltda sub-module
          
          twc.spltda =
          
            ( ( self ) => self )
            
            ( twc.spltda || { } );
            
          }
          
        const
        
          codeKey = 'twc-spltda',
          
          options = codeKey
          
            .split ( '-' )
            
            .reduce (
            
              ( obj, key ) => obj?.[ key ],
              
              window
              
              ),
              
          hasOptions = Object
          
            .keys ( options )
            
            .length;
            
        // bail if no options
        
        if ( ! hasOptions ) return;
        
        const
        
          tagParameterValue =
          
            searchParams.get ( 'tag' ),
            
          tag = tags.find (
          
            o =>
            
              o.name
              
              ===
              
              tagParameterValue
              
            );
            
        // bail if tag not in tags
        
        if ( ! tag ) {
        
          const s = `${
          
            codeKey
            
            } : tag name '${
            
              tagParameterValue
              
              }' not found in tags cache`;
              
          console.warn ( s );
          
          return;
          
          }
          
        const
        
          tagDescriptionMap =
          
            options.tagDescriptionMap,
            
          hasDescription =
          
            tag.name
            
            in
            
            tagDescriptionMap;
            
        // bail if no tag mapped
        
        if ( ! hasDescription ) {
        
          const s = `
          
            ${
            
              codeKey
              
              } : tag '${
              
                tag.name
                
                }' description not found in
                
                options
                
              `
              
              .trim ( )
              
              .replace ( /\s+/gm, ' ' );
              
          console.warn ( s );
          
          return;
          
          }
          
        const
        
          paragraphStyle = options
          
            .paragraphStyle [ 0 ]
            
            ===
            
            '['
            
            ?
            
            'Heading 3'
            
            :
            
            options
            
              .paragraphStyle,
              
          paragraphStyles = {
          
            'Heading 1' : [
            
              '<h1>',
              
              '</h1>'
              
              ],
              
            'Heading 2' : [
            
              '<h2>',
              
              '</h2>'
              
              ],
              
            'Heading 3' : [
            
              '<h3>',
              
              '</h3>'
              
              ],
              
            'Heading 4' : [
            
              '<h4>',
              
              '</h4>'
              
              ],
              
            'Paragraph 1' : [
            
              '<p class="sqsrte-large">',
              
              '</p>'
              
              ],
              
            'Paragraph 2' : [
            
              '<p>',
              
              '</p>'
              
              ],
              
            'Paragraph 3' : [
            
              '<p class="sqsrte-small">',
              
              '</p>'
              
              ],
              
            'Monospace' : [
            
              '<pre><code>',
              
              '</code></pre>'
              
              ]
              
            },
            
          html = `
          
            <div class="${
            
              codeKey
              
              }-tag-description">
              
              ${
              
                paragraphStyles
                
                  [ paragraphStyle ]
                  
                  [ 0 ]
                  
                  }
                  
                ${
                
                  tagDescriptionMap
                  
                    [ tag.name ]
                    
                  }
                  
                ${
                
                  paragraphStyles
                  
                    [ paragraphStyle ]
                    
                    [ 1 ]
                    
                    }
                    
              </div>
              
            `;
            
        document
        
          .body
          
          .querySelector (
          
            '.product-list-container'
            
            )
            
          .insertAdjacentHTML (
          
            'afterbegin',
            
            html
            
            );
            
        };
        
      self.push ( callback );
      
      return self;
      
      } ) ( twc.ptc.callbacks || [ ] );
      
    </script>
    
  <!-- end TWC Store Page List Tag Description Add -->
