  <style>
  
    .collection-type-events-stacked {
    
      --event-width-desktop : 480px;
      --event-width-mobile : 640px;
      
      }
      
    </style>
    
  <!-- do not change anything below, there be the borg here -->
  
  <style>
  
    body:not( .sqs-is-page-editing ) .collection-type-events-stacked {
    
      background-color : var( --siteBackgroundColor );
      overflow-x : scroll;
      scrollbar-width : none; /* Firefox */
      
      }
      
    body:not( .sqs-is-page-editing ) .collection-type-events-stacked::-webkit-scrollbar {
    
      display : none; /* Chrome, Safari */
      
      }
      
    body:not( .sqs-is-page-editing ) .sqs-events-collection-list {
    
      display : flex;
      
      }
      
    body:not( .sqs-is-page-editing ) .eventlist {
    
      display : flex;
      gap : 68px;
      
      }
      
    body:not( .sqs-is-page-editing ) .eventlist-event {
    
      display : block;
      margin : 0;
      width : var( --event-width-desktop );
      
      }
      
    body:not( .sqs-is-page-editing ) .collection-type-events-stacked .eventlist-event:last-child {
    
      padding-right : 4vw;
      
      }
      
    body:not( .sqs-is-page-editing ).tweak-events-stacked-show-past-events .eventlist--upcoming .eventlist-event:last-child {
    
      margin-right : 68px;
      padding : 0;
      
      }
      
    body:not( .sqs-is-page-editing ).tweak-events-stacked-thumbnail-size-11-square .eventlist-column-thumbnail {
    
      padding-bottom : 100%;
      
      }
      
    body:not( .sqs-is-page-editing ).tweak-events-stacked-thumbnail-size-32-standard .eventlist-column-thumbnail {
    
      padding-bottom : 66.666%;
      
      }
      
    body:not( .sqs-is-page-editing ).tweak-events-stacked-thumbnail-size-23-standard-vertical .eventlist-column-thumbnail {
    
      padding-bottom : 150%;
      
      }
      
    body:not( .sqs-is-page-editing ).tweak-events-stacked-thumbnail-size-43-four-thirds .eventlist-column-thumbnail {
    
      padding-bottom : 75%;
      
      }
      
    body:not( .sqs-is-page-editing ).tweak-events-stacked-thumbnail-size-169-widescreen .eventlist-column-thumbnail {
    
      padding-bottom : 56.25%;
      
      }
      
    body:not( .sqs-is-page-editing ).tweak-events-stacked-thumbnail-size-ultra-widescreen .eventlist-column-thumbnail {
    
      padding-bottom : 40.911%;
      
      }
      
    body:not( .sqs-is-page-editing ) .eventlist-column-thumbnail {
    
      width : unset;
      
      }
      
    body:not( .sqs-is-page-editing ) .eventlist-column-info {
    
      margin-top : 25.5px;
      padding : 0;
      width : unset;
      
      }
      
    body:not( .sqs-is-page-editing ) .eventlist-past-upcoming-divider {
    
      border : unset;
      border-left : 1px solid rgba( 230, 230, 230, 0.8 );
      height : unset;
      
      }
      
    @media
    only screen and ( pointer : coarse ) and ( max-width : 1024px ),
    screen and ( max-width : 799px )
    
      {
      
        body:not( .sqs-is-page-editing ) .eventlist-event {
        
          width : var( --event-width-mobile );
          
          }
          
        }
        
    @media screen and ( max-width : 767px ) {
    
      body:not( .sqs-is-page-editing ).tweak-events-stacked-width-full .events .eventlist-event:last-child,
      body:not( .sqs-is-page-editing ).tweak-events-stacked-width-inset .events .eventlist-event:last-child
      
        {
        
          padding-right : 6vw;
          
          }
          
        }
        
    @media only screen and ( max-width : 639px ) {
    
      body:not( .sqs-is-page-editing ) .eventlist {
      
        gap : 34px;
        
        }
        
      body:not( .sqs-is-page-editing ).tweak-events-stacked-show-past-events .eventlist--upcoming .eventlist-event:last-child {
      
        margin-right : 34px;
        padding : 0;
        
        }
        
      }
      
    </style>
    
  <!-- end TWC Events Page List Horizontal Scroll -->
