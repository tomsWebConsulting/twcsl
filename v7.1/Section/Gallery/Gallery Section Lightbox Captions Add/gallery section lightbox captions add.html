  <style>
  
    .gallery-lightbox-item-wrapper {
    
      flex-direction : column;
      gap : 1em;
      text-align : center;
      
      }
      
    .gallery-lightbox-list figcaption {
    
      align-content : center;
      height : var( --twc-gslca-height );
      
      }
    
    .gallery-lightbox-item:not( :last-child ) figcaption {
    
      visibility : hidden;
      
      }
      
    .gallery-lightbox-controls {
    
      height : calc( 100% - var( --twc-gslca-height ) );
      
      }
      
    </style>
    
  <script>
  
    ( ( ) => {
    
      const
      
        version = '0.2.0',
        
        s = `
        
          Gallery Section Lightbox Captions Add v${ version }
          
          License < https://tinyurl.com/s872fb68 >
          
          © 2026 Thomas Creedon
          
          Tom's Web Consulting < http://www.tomsWeb.consulting >
          
          `
          
          .replace ( /^ +/gm, '' );
          
      console.log ( s );
      
      let
      
        height = 0,
        
        observer;
        
      const
      
        attributesMutationCallback =
        
          ( mutation ) => {
          
            const
            
              attribute = 'data-open',
              
              isAttribute = mutation
              
                .attributeName
                
                ===
                
                attribute;
                
            // bail if not attribute of interest
            
            if ( ! isAttribute ) return;
            
            const
            
              element = mutation
              
                .target,
                
              isOpen = element
              
                .getAttribute ( attribute )
                
                ===
                
                'true';
                
            // bail if not open
            
            if ( ! isOpen ) return;
            
            height = 0;
            
            element
            
              .querySelectorAll (
              
                'figcaption'
                
                )
                
              .forEach (
              
                e => height = Math.max (
                
                  e.offsetHeight,
                  
                  height
                  
                  )
                  
                );
                
            element
              
              .style
              
              .setProperty (
              
                `--${ codeKey }-height`,
                
                `${ height }px`
                
                );
                
            },
            
        codeKey = 'twc-gslca',
        
        itemCallback = ( element ) => {
        
          const
          
            text = element
            
              .querySelector ( 'img' )
              
              .getAttribute ( 'alt' )
              
              .replaceAll ( '\n', '<br>' )
              
              ||
              
              '',
              
            html = `
            
              <figcaption>
              
                ${ text }
                
                </figcaption>
                
              `,
              
            selector =
            
              '.gallery-lightbox-item-wrapper';
              
          element
          
            .querySelector ( selector )
            
            .insertAdjacentHTML (
            
              'beforeend',
              
              html
              
              );
              
          },
          
        nodeCallback = ( node ) => {
        
          const isElement = node
          
            .nodeType
            
            ===
            
            1;
            
          // bail if not element
          
          if ( ! isElement ) return;
          
          const hasClass = node
          
            .classList
            
            .contains ( 
            
              'gallery-lightbox-outer-wrapper'
              
              );
              
          // bail if no class name
          
          if ( ! hasClass ) return;
          
          node
          
            .querySelectorAll (
            
              '.gallery-lightbox-item'
              
              )
              
            .forEach ( itemCallback );
            
          observer.disconnect ( );
          
          new MutationObserver (
          
            ms => ms.forEach (
            
              m =>
              
                attributesMutationCallback (
                
                  m
                  
                  )
                  
              )
              
            )
            
            // start listening for changes in element
            
            .observe (
            
              node.querySelector (
              
                '.gallery-lightbox'
                
                ),
                
              { attributes : true }
              
              );
              
          },
          
        domContentLoadedCallback =
        
          ( ) => {
          
            observer = new MutationObserver (
            
              ms => ms.forEach (
              
                m => m
                  
                  .addedNodes
                  
                  .forEach ( nodeCallback )
                  
                )
                
              );
              
            // start listening for changes in element
            
            observer.observe (
            
              document.body,
                
              { childList : true }
                
              );
              
            };
            
      document.addEventListener (
      
        'DOMContentLoaded',
        
        domContentLoadedCallback
        
        );
        
      } ) ( );
      
    </script>
    
  <!-- end TWC Gallery Section Lightbox Captions Add -->
