  <style>
  
    #page {
    
      --twc-psst-section-visibility : hidden;
      
      }
      
    body.sqs-is-page-editing #page .page-section {
    
      display : flex !important;
      
      }
      
    body:not( .sqs-is-page-editing ) #page .page-section:not( .content-collection ):not( .gallery-section ):not( .user-items-list-section ) {
    
      visibility : var( --twc-psst-section-visibility );
      
      }
      
    /* remove some vertical spacing */
    
    body:not( .sqs-is-page-editing ) .twc-psst.section-height--small:not( .content-collection ):not( .gallery-section ):not( .user-items-list-section ) {
    
      min-height : unset;
      
      }
      
    body:not( .sqs-is-page-editing ) .twc-psst-display-flex {
      
      display : flex;
      
      }
      
    /* begin toggles */
    
      body:not( .sqs-is-page-editing ) .twc-psst .sqs-block-code .sqs-block-content {
      
        height : 100%;
        
        }
        
      x-twc-psst svg,
      x-twc-psst-close svg
      
        {
        
          fill : var( --twc-psst-toggle-color );
          height : var( --twc-psst-toggle-size );
          width : calc( var( --twc-psst-toggle-size ) * 1.66 );
          
          }
          
      body:not( .sqs-is-page-editing ) x-twc-psst-close,
      body:not( .sqs-is-page-editing ) .twc-psst
      
        {
        
          cursor : pointer;
          
          }
          
      x-twc-psst,
      x-twc-psst-close
      
        {
        
          align-items : center;
          display : flex;
          height : 100%;
          justify-content : var( --twc-psst-toggle-justify );
          
          }
          
      /* begin arrow */
      
        body:not( .sqs-is-page-editing ) x-twc-psst-close .twc-psst-arrow,
        body:not( .sqs-is-page-editing ) .twc-psst--open x-twc-psst .twc-psst-arrow
        
          {
          
            transform : rotate( 180deg );
            
            }
            
        /* end arrow */
        
      /* begin plus */
      
        body:not( .sqs-is-page-editing ) x-twc-psst-close .twc-psst-plus use:nth-child( 2 ),
        body:not( .sqs-is-page-editing ) .twc-psst--open x-twc-psst .twc-psst-plus use:nth-child( 2 )
        
          {
          
            display : none;
            
            }
            
        /* end plus */
        
      /* end toggles */
      
    </style>
    
  <svg id="twc-psst" display="none" xmlns="http://www.w3.org/2000/svg" xmlns:svg="http://www.w3.org/2000/svg">
  
    <!-- arrow -->
    
    <symbol id="twc-psst-arrow" viewBox="0 0 5.3222652 3.2226501">
    
      <path d="M 0.560547,0 0,0.56054 2.662109,3.22265 5.322265,0.56054 4.761718,0 2.660156,2.09961 Z" />
      
      </symbol>
      
    <!-- begin plus -->
    
      <symbol id="twc-psst-plus-horizontal" viewBox="0 0 3 3">
      
        <path d="m 0,1 v 1 h 3 v -1 z" />
        
        </symbol>
        
      <symbol id="twc-psst-plus-vertical" viewBox="0 0 3 3">
      
        <path d="m 1,0 v 3 h 1 v -3 z" />
        
        </symbol>
        
      <!-- end plus -->
      
    </svg>
    
  <script>
  
    $( ( ) => {
    
      const
      
        version = '0.10.0',
      
        s = `
        
          Page Sections Slide Toggle v${ version }
        
          License < https://tinyurl.com/s872fb68 >
          
          © 2021-2026 Thomas Creedon
          
          Tom's Web Consulting < http://www.tomsWeb.consulting >
          
          `
          
          .replace ( /^\s+/gm, '' );
          
      console.log ( s );
      
      const
      
        codeKey = 'twc-psst',
        
        codeKeyCamelCase = codeKey
        
          .replace (
          
            /-([a-zA-Z])/g,
            
            ( _, c ) => c.toUpperCase ( )
            
            ),
            
        isEditor = $( 'html' )
        
          .hasClass (
          
            'squarespace-damask'
            
            ),
            
        openClassName =
        
          `${ codeKey }--open`,
          
        options = codeKey
        
          .split ( '-' )
          
          .reduce (
          
            ( obj, key ) => obj?.[ key ],
            
            window
            
            ),
            
        sectionSelector =
        
          '[ data-test = "page-section" ]',
      
        attribute = `data-${
              
          codeKey
          
          }-section-group`,
          
        closeSectionClickCallback =
        
          function ( ) {
          
            $( this )
            
              .parents ( '.page-section' )
              
              .prevAll ( `.${ codeKey }` )
              
              .first ( )
              
              .click ( );
              
            };
            
      let
      
        duration = options.duration,
        
        sectionGroupCount = 1,
      
        $anchorLinkElement = $(
        
          location.hash
          
          );
          
      const
      
        gotoAnchorLink = ( ) => {
        
          const isExists =
          
            $anchorLinkElement.length;
            
          // bail if no element
          
          if ( ! isExists ) return;
          
          $anchorLinkElement [ 0 ]
          
            .scrollIntoView ( );
            
          },
          
        sectionNextClickCallback =
        
          function ( $sectionNextElements ) {
          
            const isEditing = $( 'body' )
            
              .hasClass (
              
                'sqs-is-page-editing'
                
                );
                
            // bail if is editing
            
            if ( isEditing ) return;
            
            $( this )
            
              .toggleClass (
              
                openClassName
                
                );
                
            $sectionNextElements
            
              .slideToggle ( duration );
              
            dispatchEvent (
            
              new Event ( 'resize' )
              
              );
              
            };
            
      $(
      
        `#page ${
        
          sectionSelector
          
          } x-${
          
            codeKey
            
            }`
            
        )
        
        .each (
        
          function ( ) {
          
            const
            
              $this = $( this ),
              
              $sectionElement = $this
              
                .parents ( sectionSelector )
                
                .addClass ( `${ codeKey }` )
                
                .attr (
                
                  attribute,
                  
                  sectionGroupCount
                  
                  );
                  
            let
            
              count = $this.attr (
              
                'data-section-count'
                
                ),
                
              open = $this.attr (
              
                'data-open'
                
                );
                
            count = count
            
              ===
              
              undefined
              
              ?
              
              1
              
              :
              
              Number ( count );
              
            $sectionElement.data (
            
              `${
              
                codeKeyCamelCase
                
                }Open`,
                
              open
              
                ===
                
                undefined
                
                ?
                
                false
                
                :
                
                Boolean ( open )
                
              );
              
            const $sectionNextElements =
            
              $sectionElement
              
                .nextAll (
                
                  sectionSelector
                  
                  )
                  
                .slice ( 0, count )
                
                .attr (
                
                  attribute,
                  
                  sectionGroupCount++
                  
                  );
                  
            $sectionElement.click (
            
              function ( ) {
              
                sectionNextClickCallback
                
                  .call (
                  
                    this,
                    
                    $sectionNextElements
                    
                    );
                    
                }
                
              );
              
            }
            
          );
          
      const $anchorLinkSection =
      
        $anchorLinkElement.closest (
        
          `[ ${ attribute } ]`
          
          );
      
      if ( ! $anchorLinkSection.length ) {
      
        $( `.${ codeKey }` ).each (
        
          function ( ) {
          
            const
            
              $this = $( this ),
              
              $elements = $( `
              
                [
                
                  data-${
                  
                    codeKey
                    
                    }-section-group
                    
                  =
                  
                  "${
                  
                    $this.attr (
                    
                      attribute
                      
                      )
                      
                    }"
                    
                  ]
                  
                ` )
                
                .slice ( 1 ),
                
              hasAnchorLink = $elements
              
                .is (
                
                  $anchorLinkSection
                  
                  );
                  
            // bail if has anchor link
            
            if ( hasAnchorLink ) return;
            
            const open = $this.data (
            
              `${ codeKeyCamelCase }Open`
              
              );
              
            if ( open )
            
              $this.toggleClass (
              
                openClassName
                
                );
                
              else
              
                $elements.css (
                
                  'display',
                  
                  'none'
                  
                  );
                  
            } );
            
        } else {
        
          const $elements = $( `
          
            [
            
              data-${
              
                codeKey
                
                }-section-group
                
              =
              
              "${
              
                $anchorLinkSection
                
                  .attr ( attribute )
                  
                }"
                
              ]
              
            ` )
              
              .first ( )
              
              .addClass ( openClassName )
              
              .end ( );
              
          $(
          
            '[ data-twc-psst-section-group ]'
            
            +
            
            `:not( .${ codeKey } )`
            
            )
            
            .not ( $elements )
              
            .css (
            
              'display',
              
              'none'
              
              );
              
          }
          
      $(
      
        `#page .page-section x-${
        
          codeKey
          
          }-close`
          
        ).each (
        
          function ( ) {
          
            $( this ).click (
            
              closeSectionClickCallback
              
              );
              
            }
            
          );
        
      if ( isNaN ( duration ) ) {
      
        if ( duration [ 0 ] == '[' )
        
          duration = '';
          
        } else
        
          duration = Number ( duration );
          
      $( '#page' ).css (
      
        `--${ codeKey }-section-visibility`,
        
        'visible'
        
        );
        
      gotoAnchorLink ( );
      
      // section open when URL hash changes
      
      $( window ).on (
      
        'hashchange',
        
        ( ) => {
        
          $anchorLinkElement = $(
          
            location.hash
            
            );
            
          let isExists =
          
            $anchorLinkElement.length;
            
          // bail if no element
          
          if ( ! isExists ) return;
          
          const $anchorLinkSection =
          
            $anchorLinkElement
            
              .closest (
              
                `[ ${ attribute } ]`
                
                );
            
          isExists =
          
            $anchorLinkSection.length;
            
          // bail if no element
          
          if ( ! isExists ) return;
          
          const $elements = $( `[
            
            data-twc-psst-section-group
            
            =
            
            "${
            
              $anchorLinkSection
              
                .attr ( attribute )
                
              }"
              
            ]` );
            
          const hasClassName = $elements
            
              .first ( )
              
              .hasClass (
              
                openClassName
                
                );
                
          // bail if class name
          
          if ( hasClassName ) return;
          
          let i = 0;
          
          const
          
            count = $elements.length - 1,
            
            complete = ( ) => {
            
              if ( ++i !== count )
              
                return;
                
              dispatchEvent (
              
                new Event ( 'resize' )
                
                );
              
              setTimeout (
              
                ( ) => {
                
                  gotoAnchorLink ( );
                  
                  },
                  
                100
                
                );
                
              };
              
          $elements
          
            .first ( )
            
            .addClass ( openClassName )
            
            .end ( )
            
            .slice ( 1 )
            
            .slideToggle (
            
              duration,
              
              complete
              
              );
              
          }
          
        );
        
      // bail if not editor
      
      if ( ! isEditor ) return;
      
      const
      
        mutationCallback = ( mutation ) => {
        
          const isAttribute =
          
            mutation.type === 'attributes';
            
          // bail if not attribute
          
          if ( ! isAttribute ) return;
          
          const isClass =
          
            mutation.attributeName
            
            ===
            
            'class';
            
          // bail if not attribute class
          
          if ( ! isClass ) return;
          
          const isEditing = $( target )
          
            .hasClass ( 'sqs-is-page-editing' );
            
          // bail if has class name sqs-is-page-editing
          
          if ( ! isEditing ) return;
          
          dispatchEvent (
          
            new Event ( 'resize' )
            
            );
            
          },
          
        mutationsCallback =
        
          ( mutations ) => {
          
            mutations
            
              .forEach ( mutationCallback );
            
            },
            
        observer =
        
          new MutationObserver (
          
            mutationsCallback
            
            );
            
      // start listening for changes in element
      
      observer.observe (
      
        document.body,
        
        {
        
          attributes : true
          
          }
          
        );
        
      } );
      
    </script>
    
  <!-- end TWC Page Sections Slide Toggle -->
