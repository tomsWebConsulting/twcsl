    v7.0
    Templates         : Brine ( Aria, Blend, Burke, Cacao, Clay, Fairfield,
                        Feed, Foster, Greenwich, Hatch, Heights, Hunter,
                        Hyde, Impact, Jaunt, Juke, Keene, Kin, Lincoln,
                        Maple, Margot, Marta, Mentor, Mercer, Miller,
                        Mojave, Moksha, Motto, Nueva, Pedro, Pursuit, Rally,
                        Rover, Royce, Sofia, Sonora, Stella, Thorne, Vow,
                        Wav, West )
                        
                        Five
                        
                        Montauk ( Julia, Kent, Om )
                        
                        your template is not listed? then it is not
                        currently supported
    
    Notes             : this code is a base for other effects
                        
                        this code makes calls to the json version of
                        products for information that is not normally
                        available
                        
                        the code adds a data-twc-sppc-mo attribute with
                        value of false on elements with class names for
                        price. by changing the attribute value to true you
                        will cause a mutation which will cause the search
                        replace text to run. the attribute value will be set
                        to false after the search replace text run
                        
                        the code fails silently. poorly formed regular
                        expressions will stop the processing of
                        search/replace text pairs

    no user serviceable parts below
    
    -->
    
  <style>
  
    .product-price, /* 7.1, 7.0 */
    .product-list-item-price /* 7.1 */
    
      {
      
        transition : opacity 1s linear;
        
        &:not( .twc-sppc ) {
        
          opacity : 0;
          
          }
          
        }
        
    </style>
    
  <script>
  
    ( ( ) => {
    
      // debugger;
      
      const
      
        title = 'Store Page Price Change',
        
        version = '0.10.0',
        
        s = `${ title } v${ version }
        
          License < https://tinyurl.com/s872fb68 >
          
          © 2021-2026 Thomas Creedon
          
          Tom's Web Consulting < http://www.tomsWeb.consulting >`
          
          .replace ( /^\s+/gm, '' );
          
      console.log ( s );
      
      const
      
        context = Static.SQUARESPACE_CONTEXT,
        
        isStorePage = context
          
          .collection
          
          ?.type
          
          ===
          
          13;
          
      // bail if not store page
      
      if ( ! isStorePage ) return;
      
      // globals
      
      {
      
        // initialize twc module
        
        window.twc = window.twc || { };
          
        // initialize twc sppc sub-module
        
        twc.sppc = twc.sppc || { };
          
        // initialize twc sppc callbacks sub-module
        
        twc.sppc.callbacks =
        
          twc.sppc.callbacks || { };
          
        }
        
      let
      
        items,
        
        observer,
        
        productPriceElements;
        
      const
      
        codeKey = 'twc-sppc',
        
        isDetail = !! context.item,
        
        isList = ! context.item?.id,
        
        options = codeKey
        
          .split ( '-' )
          
          .reduce (
          
            ( obj, key ) => obj?.[ key ],
            
            window
            
            ),
           
        searchReplacePipeline =
        
          (
          
            text,
            
            node,
            
            type,
            
            data
            
            ) => {
            
              const entries = Object.entries (
              
                options.searchReplaceText
                
                );
                
              for (
              
                const [ key, value ] of entries
                
                ) {
                
                  let
                  
                    r = value,
                    
                    s = key;
                    
                  const m = s.match (
                  
                    /\/(.+)\/(.*)/
                    
                    );
                    
                  if ( m ) {
                  
                    try {
                    
                      s = new RegExp (
                      
                        m [ 1 ],
                        
                        m [ 2 ]
                        
                        );
                        
                      } catch {
                      
                        // bail on error, keep current text
                        
                        return text;
                        
                        }
                        
                    if ( ! s.test ( text ) )
                    
                      continue;
                      
                    }
                    
                  const isFunction =
                  
                    typeof
                    
                    options
                    
                      .callbacks
                      
                      [ r ]
                      
                      ===
                      
                      'function';
                      
                  if ( isFunction ) {
                  
                    r = options
                    
                      .callbacks
                      
                      [ r ]
                      
                      (
                      
                        node,
                        
                        type,
                        
                        text,
                        
                        s,
                        
                        data
                        
                        );
                        
                    if (
                    
                      typeof r === 'boolean'
                      
                      ) {
                      
                        // bail
                        
                        if ( r === false )
                        
                          break;
                          
                        // skip replace
                        
                        continue;
                        
                        }
                        
                    }
                    
                  text =
                  
                    text.replace ( s, r );
                    
                  }
                  
              return text;
              
              },
              
        ssVersion = context.templateVersion,
        
        urls = [ ],
        
        attribute = `data-${ codeKey }-mo`,
        
        changeText = async ( node ) => {
        
          const
          
            type =
            
              node.closest (
              
                [
                
                  // 7.1
                  
                  '#main-product-price',
                  
                  // begin 7.0
                  
                    // Brine
                    
                    '.ProductItem-details',
                    
                    // Five, Montauk
                    
                    '#productDetails'
                    
                    // end 7.0
                    
                  ]
                  
                  .join ( ', ' )
                  
                )
                
              ?
              
              'detail'
              
              :
              
              isList
              
              ?
              
              'list'
              
              :
              
              node.closest (
              
                [
                
                  // 7.1
                  
                  '.related-products',
                  
                  // begin v7.0
                  
                    // Brine
                    
                    '.ProductItem-relatedProducts-item',
                    
                    // Five, Montauk
                    
                    '.relatedProducts-item'
                    
                    // end v7.0
                    
                  ]
                  
                  .join ( ', ' )
                  
                )
                
              ?
              
              'related'
              
              :
              
              node.closest (
              
                '.add-on-details'
                
                )
                
              ?
              
              'add on'
              
              :
              
              undefined,
              
            walker =
            
              document.createTreeWalker (
              
                node,
                
                NodeFilter.SHOW_TEXT
                
                );
                
          let url;
          
          switch ( type ) {
          
            case 'add on' : {
            
              url = node
              
                .parentNode
                
                .previousElementSibling
                
                .getAttribute ( 'href' );
                
              break;
              
              }
              
            case 'detail' :
            
              url = context.item.fullUrl;
              
              break;
              
            case 'list' : {
            
              url = node.parentNode;
              
              url =
              
                url
                
                  .closest (
                  
                    [
                    
                      // 7.1
                      
                      '.product-list-item-link',
                      
                      // 7.0 ( Brine, Montauk )
                      
                      '.product'
                      
                      ]
                      
                      .join ( ', ' )
                      
                    )
                    
                  ?.getAttribute (
                  
                    'href'
                    
                    )
                    
                ??
                
                // 7.0
                
                url
                
                  .closest (
                  
                    '.ProductList-item'
                    
                    )
                    
                  .querySelector (
                  
                    '.ProductList-item-link'
                    
                    )
                    
                  .getAttribute (
                  
                    'href'
                    
                    );
                    
              break;
              
              }
              
            case 'related' : {
            
              url =
              
                (
                
                  node.closest (
                    
                    [
                    
                      // 7.1
                      
                      '.product-list-item-link',
                      
                      // 7.0 Five, Montauk
                      
                      '.relatedProducts-item'
                      
                      ]
                      
                      .join ( ', ' )
                      
                    )
                    
                  ??
                  
                  // Brine
                  
                  node
                  
                    .closest (
                    
                      '.ProductItem-relatedProducts-item'
                      
                      )
                      
                    .querySelector (
                    
                      '.ProductItem-relatedProducts-link'
                      
                      )
                      
                  )
                  
                  .getAttribute ( 'href' );
                  
              break;
              
              }
              
            }
            
          const data = items
          
            .filter (
            
              i => i.fullUrl === url
              
              )
              
              [ 0 ];
              
          while ( walker.nextNode ( ) ) {
          
            const
            
              node = walker.currentNode,
              
              t = searchReplacePipeline (
              
                node.data,
                
                node,
                
                type,
                
                data
                
                );
                
            node.data = t;
            
            }
            
          },
          
        is70 = ssVersion === '7',
        
        is71 = ssVersion === '7.1',
        
        observeOptions = {
        
          attributeFilter : [ attribute ],
          
          attributeOldValue : true,
          
          childList : true,
          
          subtree : true
          
          },
          
        pricesObserve = ( ) => {
        
          const isAfterPay =
          
            isDetail
            
            &&
            
            options.afterpay;
            
          // start listening for changes in element
          
          productPriceElements
          
            .forEach (
            
              e => observer.observe (
              
                e,
                
                observeOptions
                
                )
                
              );
              
          // bail if not afterpay
          
          if ( ! isAfterPay ) return;
          
          // start listening for changes in element
          
          document
          
            .body
            
            .querySelectorAll (
            
              [
              
                // 7.1
                
                '.product-payment-method-messaging',
                
                // 7.0
                
                'div[ data-afterpay="true" ]'
                
                ]
                
                .join ( ', ' )
                
              )
            
            .forEach (
            
              e => observer.observe (
              
                e,
                
                observeOptions
                
                )
                
              );
              
          },
          
        mutationCallback = ( mutation ) => {
        
          const hasAttribute = mutation
          
            .attributeName
            
            ===
            
            attribute;
            
          let b = ! mutation
          
            .addedNodes
            
            .length
            
            &&
            
            ! hasAttribute;
            
          // continue if no element and no attribute
          
          if ( b ) return true;
          
          const target = mutation.target;
          
          // previous change was forced
          
          if ( hasAttribute ) {
          
            b = target
            
              .getAttribute (
              
                attribute
                
                )
                
                ===
                
                'true';
                
            if ( b )
            
              target.setAttribute (
              
                attribute,
                
                'false'
                
                );
                
              else if (
              
                mutation.oldValue === 'true'
                
                )
                
                return true; // continue
                
            }
            
          observer.disconnect ( );
          
          b =
          
            changeText ( target )
            
            ===
            
            false;
            
          if ( b ) return false; // bail
          
          pricesObserve ( );
          
          return true;
          
          },
          
        callback = async ( ) => {
        
          const isProductEditMode = window
          
            .top
            
            .document
            
            .querySelector (
            
              '.editor-modal-dialog'
              
              );
              
           // bail if product edit mode
           
          if ( isProductEditMode ) return;
          
          switch ( true ) {
          
            case isDetail : {
            
              urls.push (
              
                context.item.fullUrl,
                
                ...
                
                [
                
                  ...
                  
                  document
                  
                    .body
                    
                    .querySelectorAll (
                    
                      [
                      
                        // begin v7.1
                        
                          '.add-on-title-link',
                          
                          '.product-list-item-link',
                          
                          // end v7.1
                          
                        // begin 7.0
                        
                          // Brine
                          
                          '.ProductItem-relatedProducts-link',
                          
                          // Five, Montauk
                          
                          '.relatedProducts-item'
                          
                        ]
                        
                        .join ( ', ' )
                        
                      )
                      
                  ]
                  
                  .map (
                  
                    e => e.getAttribute (
                    
                      'href'
                      
                      )
                      
                    )
                    
                );
                
              break;
              
              }
              
            case isList :
            
              urls.push (
              
                context
                  
                  .collection
                  
                  .fullUrl
                  
                );
                
              break;
              
            }
            
          const promises = urls.map (
          
            async u => {
            
              u += '?format=json';
              
              try {
              
                let r = await fetch ( u );
                  
                if ( ! r.ok ) {
                
                  const s = `
                  
                    ${
                    
                      codeKey
                      
                      } network response was not ok ${
                      
                        r.statusText
                        
                        }
                        
                    `
                    
                    .trim ( )
                    
                    .replace ( /\s+/gm, ' ' );
                    
                  throw new Error ( s );
                  
                  }
                  
                r = await r.json ( );
                
                switch ( true ) {
                
                  case isDetail :
                  
                    r = r.item;
                    
                    break;
                    
                  case isList :
                  
                    r = r.items;
                    
                    break;
                    
                  }
                  
                return r;
                
                } catch ( error ) {
                
                  const s = `
                  
                    ${
                    
                      codeKey
                      
                      }
                      
                    there has been a problem
                    
                    with your fetch get
                    
                    operation, ${
                    
                      error
                      
                      }.
                      
                    `
                    
                    .trim ( )
                    
                    .replace ( /\s+/gm, ' ' );
                    
                  console.error ( s );
                  
                  }
                  
              }
              
            );
            
          items = await Promise.all (
          
            promises
            
            );
            
          if ( isList )
          
            items = items [ 0 ];
            
          const
          
            isListAddToCartButtons =
            
              document
              
                .body
                
                .querySelector (
                
                  '.product-list-item-add-to-cart'
                  
                  )
                  
                !==
                
                null,
                
            isWatch = options.watch;
            
          productPriceElements =
          
            [
            
              ...
              
              document
              
                .body
                
                .querySelectorAll (
                
                  [
                  
                    '.product-list-item-price', // 7.1
                    
                    '.product-price' // 7.1, 7.0
                    
                    ]
                    
                    .join ( ', ' )
                    
                  )
                  
              ];
              
          productPriceElements.forEach (
          
            e => e.setAttribute (
            
              attribute,
              
              'false'
              
              )
              
            );
            
          productPriceElements.forEach (
          
            e => changeText ( e )
            
            );
            
          productPriceElements.forEach (
          
            e => e
            
              .classList
              
              .add (
            
                codeKey
                
                )
                
            );
            
          switch ( true ) {
          
            case isDetail :
            
              productPriceElements =
              
                productPriceElements
                
                  .filter (
                  
                    e =>
                    
                      !
                      
                      [ null, undefined ]
                      
                      .contains (
                      
                        e
                        
                          ?.closest (
                          
                            [
                            
                              // 7.1
                              
                              '.product-content-wrapper',
                              
                              // begin 7.0
                              
                                // Brine
                                
                                '.ProductItem-details',
                                
                                // Five, Montauk
                                
                                '#productDetails',
                                
                                // end 7.0
                                
                              ]
                              
                              .join ( ', ' )
                              
                            )
                            
                        )
                        
                    );
                    
              break;
              
            case isList :
            
              // bail if no atc
              
              if ( ! isListAddToCartButtons )
              
                return;
                
              productPriceElements =
                
                productPriceElements
              
                  .filter (
                  
                    e =>
                    
                      Boolean (
                      
                        e
                        
                          .closest (
                          
                            '.product-list-item'
                            
                            )
                            
                          .querySelector (
                          
                            '.product-variants'
                            
                            )
                            
                        )
                        
                    );
                    
              break;
              
            }
          
            
          if ( ! isWatch ) return;
          
          pricesObserve ( );
          
          };
          
      observer = new MutationObserver (
      
        ms => {
        
          for ( const m of ms ) {
          
            const b = mutationCallback ( m );
            
            // bail if callback returns false
            
            if ( ! b ) break;
            
            }
            
          }
          
        );
        
      switch ( true ) {
      
        case is71 :
        
          document.addEventListener (
          
            'DOMContentLoaded',
            
            callback
            
            );
            
          break;
          
        case is70 :
        
          Squarespace.onInitialize (
          
            Y,
            
            callback
            
            );
            
          break;
          
        }
        
      } ) ( );
      
    </script>
    
  <!-- end TWC Store Page Price Change -->
