<!-- begin TWC Page Tags Cache -->

  <script>
  
    ( ( ) => {
    
      /*
      
        page tags cache
        
        License           : < https://tinyurl.com/s872fb68 >
        
        Version           : 0.4.2
        
        SS Versions       : 7.1, 7.0
        
        Notes             : the code makes a call to the json version of a page
                            for tags information that is not normally available
                            through other means
                            
                            the cache disable option doesn't disable the overall
                            cache logic. it simply removes the session storage
                            key after user callbacks are run. this causes the
                            cache data to be regenerated when the Store Page is
                            reloaded. this can be useful for testing or if you
                            want site visitors to always have access to the
                            current tags
        
        Copyright         : 2025-2026 Thomas Creedon
                            
                            Tom's Web Consulting
                            
                            < http://www.tomsWeb.consulting/ >
        
        no user serviceable parts below
        
        */
        
      const
      
        version = '0.4.2',
        
        s = `
        
          Page Tags Cache v${ version }
          
          License < https://tinyurl.com/s872fb68 >
          
          © 2025-2026 Thomas Creedon
          
          Tom's Web Consulting < http://www.tomsWeb.consulting >
          
          `
          
          .replace ( /^\s+/gm, '' );
          
      console.log ( s );
      
      const
      
        isBlogPage =
        
          !!
          
          document
          
            .querySelector (
            
              [
                  
                'body[ class*="collection-type-blog-" ]',
                
                'body[ class~="collection-type-blog" ]'
                
                ]
                
                .join ( ', ' )
                
              ),
              
        isEventsPage =
        
          !!
          
          document
          
            .querySelector (
            
              [
                  
                'body[ class*="collection-type-events-" ]',
                
                'body[ class~="collection-type-events" ]'
                
                ]
                
                .join ( ', ' )
                
              ),
              
        isStorePage = Static
        
          .SQUARESPACE_CONTEXT
          
          .collection
          
          ?.type
          
          ===
          
          13,
          
        hasTags =
        
          isBlogPage
          
          ||
          
          isEventsPage
          
          ||
          
          isStorePage;
          
      // bail if not has tags
      
      if ( ! hasTags ) return;
      
      // globals
      
      {
      
        // initialize twc module
        
        window.twc = window.twc || { };
        
        // initialize twc ptc sub-module
        
        twc.ptc = twc.ptc || { };
        
        // initialize twc ptc callbacks sub-module
        
        twc.ptc.callbacks =
        
          twc.ptc.callbacks || [ ];
          
        }
        
      const
      
        codeKey = 'twc-ptc',
        
        context = Static
        
          .SQUARESPACE_CONTEXT,
          
        options = codeKey
        
          .split ( /-(.*)/ )
          
          .filter ( Boolean )
          
          .reduce (
          
            ( obj, key ) => obj?.[ key ],
            
            window
            
            ),
            
        tagNameToCssClassName = ( name ) => {
        
          // bail if no name
          
          if ( ! name ) return;
          
          const className = 'tag-'
          
            +
            
            name
            
              .replace ( /[^ \w-]+/g, '' )
              
              .replaceAll ( / +/g, '-' )
              
              .toLowerCase ( );
              
          return className;
          
          },
          
        userCallbacks = ( tags ) => {
        
          options
          
            .callbacks
            
            .forEach (
            
              c => {
              
                try {
                
                  c ( tags );
                  
                  } catch ( error ) {
                  
                    const s = `${
                    
                      codeKey
                      
                      } callback error`;
                      
                    console.error ( s, error );
                    
                    }
                    
                }
                
              );
              
          },
        
        url = context
          
          .collection
          
          .fullUrl
          
          +
          
          '?format=json',
          
        collectionId = context
        
          .collection
          
          .id;
          
        loadCallback = async ( ) => {
        
          const hasCallbacks = options
          
            .callbacks
            
            .length;
            
          // bail if no callbacks
          
          if ( ! hasCallbacks ) {
          
            const s = `${
            
              codeKey
              
              } no callbacks`;
              
            console.warn ( s );
            
            return;
            
            }
            
          let tags = JSON.parse (
          
            sessionStorage.getItem (
            
              `${
              
                codeKey
                
                }-${
                
                  collectionId
                  
                  }`
                  
              )
              
            );
            
          // bail if tags
          
          if ( tags ) {
          
            userCallbacks ( tags );
            
            if ( options.cacheDisable )
            
              sessionStorage.removeItem (
              
                `${
                
                  codeKey
                  
                  }-${
                  
                    collectionId
                    
                    }`
                    
                );
                
            return;
            
            }
            
          try {
          
            const response =
            
              await fetch ( url );
              
            if ( ! response.ok ) {
            
              const s = `
              
                ${
                
                  codeKey
                  
                  } network response was
                  
                not ok ${
                
                  response.statusText
                  
                  }
                  
                `
                
                .trim ( )
                
                .replace ( /\s+/gm, ' ' );
                
              throw new Error ( s );
              
              }
              
            tags = await response.json ( );
            
            } catch ( error ) {
            
              const s = `
              
                ${ codeKey } there has
                
                been a problem with your
                
                fetch get operation,
                
                ${ error }.
                
                `
                
                .trim ( )
                
                .replace ( /\s+/gm, ' ' );
                
              console.error ( s );
              
              } finally {
              
                // process tags
                
                tags = tags
                
                  .collection
                  
                  .tags
                  
                  .map ( name => ( {
                  
                    className :
                    
                      tagNameToCssClassName (
                      
                        name
                        
                        ),
                        
                    name
                    
                    } ) );
                    
                sessionStorage.setItem (
                
                  `${
                  
                    codeKey
                    
                    }-${
                    
                      collectionId
                      
                      }`,
                      
                  JSON
                  
                    .stringify ( tags )
                    
                  );
                  
                userCallbacks ( tags );
                
                if ( options.cacheDisable )
                
                  sessionStorage
                  
                    .removeItem (
                    
                      `${
                      
                        codeKey
                        
                        }-${
                        
                          collectionId
                          
                          }`
                          
                      );
                      
                }
                
          };
          
      window.addEventListener (
      
        'load',
        
        loadCallback
        
        );
        
      } ) ( );
      
    </script>
    
  <!-- end TWC Page Tags Cache -->
