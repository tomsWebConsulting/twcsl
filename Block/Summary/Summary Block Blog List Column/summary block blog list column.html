      display : flex;

      width : unset !important;
      
      }
      
    .twc-sbblc .summary-content {
    
      width : unset !important;
      
      }
      
    @media screen and ( max-width : 640px ) {
      
      .twc-sbblc.sqs-block[ data-definition-name = "website.components.summary" ] .summary-block-setting-design-list .summary-thumbnail-outer-container {
      
        width : unset !important;
        
        }
        
      }
      
    @media screen and ( max-width : 480px ) {
    
      .twc-sbblc .sqs-gallery-design-list .sqs-gallery-design-list-slide:not( .no-image ) .sqs-gallery-meta-container {
      
        width : unset !important;
        
        }
        
      }
      
    </style>
    
  <script>
  
    ( ( ) => {
    
      // debugger;
      
      const
      
        title = 'Summary Block Blog List Column',
        
        version = '0.1.0',
      
        s = `${ title } v${ version }
        
          License < https://tinyurl.com/s872fb68 >
          
          © 2024-2026 Thomas Creedon
          
          Tom's Web Consulting < http://www.tomsWeb.consulting >`
          
          .replace ( /^\s+/gm, '' );
          
      console.log ( s );
      
      const
      
        codeKey = 'twc-sbblc',
        
        domContentLoadedCallback =
        
          ( ) => {
          
            // globals
            
            {
            
              // initialize twc module
              
              window.twc = window.twc || { };
              
              // initialize twc sbblc sub-module
              
              twc.sbblc = twc.sbblc || { };
              
              // initialize twc sbblc block ids sub-module
              
              }
              
            const
            
              options = codeKey
              
                .split ( /-(.*)/ )
                
                .filter ( Boolean )
                
                .reduce (
                
                  ( obj, key ) => obj?.[ key ],
                  
                  window
                  
                  ),
                  
              blockIds = [
              
                ...
                
                new Set ( options.blockIds )
                
                ]
                
                .map (
                
                  id => {
                  
                    if ( id [ 0 ] !== '#' )
                    
                      id = '#' + id;
                      
                    return id;
                    
                    }
                    
                  ),
                  
              selector =
              
                blockIds.join ( ', ' );
                
            document
            
              .body
              
              .querySelectorAll ( selector )
                
              .forEach (
              
                e => e
                
                  .classList
                  
                  .add ( codeKey )
                  
                );
                
            };
            
      // domContentLoadedCallback ( );
      
      //
      
      document.addEventListener (
      
        'DOMContentLoaded',
        
        domContentLoadedCallback
        
        );
        
      //
      
      } ) ( );
      
    </script>
    
  <!-- end TWC Summary Block Blog List Column -->
