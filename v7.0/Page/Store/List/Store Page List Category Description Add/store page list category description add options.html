  <style>
  
    .twc-splcda {
    
      margin-bottom : 25px;
      
      }
      
    </style>
    
  <script>
  
    ( ( ) => {
    
      // initialize twc module
      
      window.twc = window.twc || { };
      
      // initialize twc splcda sub-module
      
      twc.splcda = ( ( self ) => {
      
        const options = {
        
          map : {
          
            /*
            
              the format of each line is a category name and a page url slug.
              you only need exactly what can be selected from the corresponding
              Squarespace UI fields
              
              following is an example line. copy and paste it after the example
              line. remove the double forward slash space from each new line
              
              you can repeat the example line for as many categories you want to
              add descriptions too. this has been done once initially
              
              */
              
            // '[ enter category name here between single quotes replacing square brackets ]' : '[ enter page url slug here between single quotes replacing square brackets ]',
            
            '[ enter category name here between single quotes replacing square brackets ]' : '[ enter page url slug here between single quotes replacing square brackets ]',
            
            },
            
          // use afterbegin, afterend, beforebegin or beforeend
          
          insertPosition : 'beforebegin',
          
          /*
          
            optional - selector, use to override built in selectors. the
            selector you use may not be supported by the CSS in this effect
            
            */
            
          selector : ''
          
          };
          
        Object
        
          .assign (
          
            self,
            
            options
            
            );
            
        return self;
        
        } ) ( twc.splcda || { } );
        
      } ) ( );
      
    </script>
