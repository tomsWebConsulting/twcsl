<script>

  ( ( ) => {
  
    const domContentLoadedCallback =
    
      ( ) => {
      
        new MutationObserver (
        
          ms => ms.forEach (
          
            m => console.log (
            
              'mutation : ',
              
              m
              
              )
              
            )
            
          )
          
          // start listening for changes in element
          
          .observe (
          
            document.body,
            
            { childList : true }
            
            );
            
      };
      
    document.addEventListener (
    
      'DOMContentLoaded',
      
      domContentLoadedCallback
      
      );
      
    } ) ( );
    
  </script>
